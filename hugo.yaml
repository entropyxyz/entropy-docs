baseURL: "/"
languageCode: en-us
title: "Entropy Docs"
theme: "hextra"

menu:
  main:
    - name: Search
      identifier: search
      weight: 4
      params:
        type: search
    - name: GitHub
      identifier: github
      weight: 5
      url: "https://github.com/entropyxyz/entropy-docs"
      params:
        icon: github
  sidebar:
    - name: External links
      identifier: external-links
      params:
        type: separator
      weight: 1
    - name: "Community Repository"
      identifier: community-repository 
      url: "https://github.com/entropyxyz/community"
      weight: 2
    - name: "GitHub Organization"
      identifier: github-organization 
      url: "https://github.com/entropyxyz"
      weight: 3
    - name: "Discord Server"
      identifier: discord-server
      url: "https://discord.com/invite/9JUQwHBhVz"
      weight: 4

defaultContentLanguage: en
languages:
  en:
    languageName: English
    weight: 1
  uk:
    languageName: Українська
    weight: 2

params:
  description: "Entropy liberates users from on-chain friction through novel cryptography to build autonomous systems."

  navbar:
    displayTitle: false
    displayLogo: true
    logo:
      path: "images/entropy-logo-black.png"
      dark: "images/entropy-logo-white.png"
      width: 80

  page:
    width: full # full/wide/normal

  theme:
    default: system
    displayToggle: true
    hideLabel: true

  plausibleAnalytics: true
